

<!DOCTYPE html>

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Exercice 2</title>
    <style>
        form {
            display: flex;
            flex-direction: column;
        }
        .form-row {
            display: flex;
            flex-flow: row wrap;
            align-self: stretch;
        }

        .radio-group {
            display: flex;
        }

        .radio-group label {
            flex: 1;
            white-space: nowrap;
            font-size: 18px;
            height: 34px;
            padding: 5px 7px 0 0;
        }

        input[type="text"],
        select {
            font-size: 18px;
            height: 34px;
            padding-left: 10px;
            padding-right: 10px;
            color: #666;
            border: 1px solid #d6d6d6;
            border-radius: 4px;
            background: white;
            width: 100%;
        }

        .input-group>label {
            color: #BA1B73;
            font-size: 17px;
            font-weight: 500;
            white-space: nowrap;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin: 10px 5px;
        }
        button {
            width:100px;
            margin: auto;
            background-color: #BA1B73;
            color: white;
            padding: 5px;
            border-radius: 5px;
            border: #666 1px solid;
            text-align: center;
            cursor: pointer;
        }
        button:hover {
            background-color: #a81867;
        }
    </style>
    <script src="{{ url_for('static', filename='js/scriptExercice2.js') }}" defer></script>
</head>

<body>
    <header>
        <img class="logo" src="{{ url_for('static', filename='img/logo.jpg') }}" />
        <h3>Exercice 2</h3>
        <nav>
           
        </nav>
    </header>
    <main>
        <article>
            <form>
            <div class="form-row">
                <div class="input-group">
                    <label for="genre">Genre musical :</label>
                    <select id="genre" name="genre">
                        <option value="">Tous</option>


                    </select>
                </div>
                <div class="input-group">
                    <label for="artiste">Artiste :</label>
                    <input type="text" id="artiste" name="artiste"/>
                </div>
                <div class="input-group">
                    <label for="trier_par">Trier par :</label>
                    <div class="radio-group" id="trier_par">
                        
                    </div>
                </div>
            </div>
            <button>Afficher</button>
            <div class="albums"></div>
        </form>
        </article>
        <aside >information complémentaire</aside>
    </main>
    <footer>
        <p>Copyright &#169; 2023</p>
    </footer>
</body>
